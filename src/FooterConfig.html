<!-- 域名检测警告 -->
<div id="domain-warning" style="display: none; color: #ef4444; font-weight: bold; margin-bottom: 0.5rem; padding: 0.5rem; border: 1px dashed #ef4444; border-radius: 0.5rem;">
  当前域名并非博客主域名，随时可能删除，如有需要请前往 <a href="https://blog.haokun.me" style="text-decoration: underline; color: inherit;">blog.haokun.me</a>
</div>

<script>
  (() => {
    // 在函数顶层声明
    let host;
    const allowedHosts = [
      'blog.haokun.me',
      'blog.4848488.xyz',
      'eo.blog.haokun.me',
      'esa.blog.haokun.me',
      '6.blog.haokun.me',
      'localhost',
      '127.0.0.1',
      'render.blog.haokun.me',
      'vercel.blog.haokun.me',
      'netlify.blog.haokun.me',
    ];
    let warningDiv;

    try {
      host = window.location.hostname;
      if (allowedHosts.indexOf(host) === -1) {
        warningDiv = document.getElementById('domain-warning');
        if (warningDiv) {
          warningDiv.style.display = 'block';
        }
      }
    } catch (e) {
      console.log('Domain check error:', e);
    }
  })();
</script>
